<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | PetWeb</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a class="header__logo" href="index.html"><svg class="header-brand-mark" width="38" height="38" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="margin-right: 4px;"><path d="M20 4 L36 16 V34 H26 V24 A6 6 0 0 0 14 24 V34 H4 V16 Z" fill="url(#houseGrad)"/><circle cx="20" cy="14" r="3" fill="#FFFFFF"/><defs><linearGradient id="houseGrad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#4F46E5"/><stop offset="1" stop-color="#EC4899"/></linearGradient></defs></svg><span class="header__logo-text">PetWeb</span></a>
    </div>
  </header>
  <main class="auth-shell">
    <form class="auth-card" action="#" data-signup-form novalidate>
      <p class="section-eyebrow">Nova conta</p>
      <h1 class="section-title">Cadastro</h1>
      <label class="field"><span class="field__label">Nome completo</span><input class="field__input" name="nome" required maxlength="100"><span class="field__error"></span></label>
      <label class="field"><span class="field__label">E-mail</span><input class="field__input" type="email" name="email" required><span class="field__error"></span></label>
      <label class="field"><span class="field__label">Telefone</span><input class="field__input" type="tel" name="telefone" required><span class="field__error"></span></label>
      <label class="field"><span class="field__label">Senha</span><input class="field__input" id="senha" type="password" name="senha" minlength="8" required><span class="field__error"></span></label>
      <div class="password-strength" aria-hidden="true"><span></span></div>
      <label class="field"><span class="field__label">Confirmar senha</span><input class="field__input" type="password" name="confirmar_senha" minlength="8" required><span class="field__error"></span></label>
      <label class="field" style="display: flex; align-items: center; gap: 8px; flex-direction: row; margin-top: var(--space-4);">
        <input type="checkbox" name="termos" required> Aceito os Termos de Uso
      </label>
      <div style="margin-top: var(--space-6); display: flex; flex-direction: column; gap: var(--space-4);">
        <button class="btn btn-cta" type="submit" style="width: 100%;">Criar conta</button>
        <p style="text-align: center; margin: 0;">Já tem conta? <a href="login.html" data-login-link style="color: var(--clr-primary-700); font-weight: 800;">Entrar</a></p>
      </div>
    </form>
  </main>
  <script src="js/script.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <!-- Início do widget VLibras -->
  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
  </script>
  <!-- Fim do widget VLibras -->
</body>
</html>
